name: astrbot_plugin_meme_manager_plus
display_name: 角色扮演图片聊天
desc: 大模型分析对话情景，并基于预设的novelai形象tag，生成无消耗、效果较好的沉浸式图片对话体验。推荐安装日常穿搭插件，体验极好，不会玩novelai也支持心情表情模式。
help: |
  自动检测 Bot 回复的情绪和表达欲望，双级概率独立判定。
  第一级：表达欲望评分决定是否触发发图。
  第二级：LLM 生图概率决定是否调用 API 生成新图。
  无论是否生图，都从对应心情目录随机抽取一张发送。
  支持 Gemini 和 Grok 双引擎，图库有参考图时图生图，无图时文生图。
  在 memes/ 下新建文件夹即可添加自定义心情。
  支持定时从 Booru/Pixiv 图站自动搜图入库（LLM 自动分类心情）。
  命令：心情表情状态 / 心情表情刷新 / 自动搜图开启 / 自动搜图关闭 / 自动搜图立即执行 / 搜图 N
version: v3.8.5
author: "LOVEROXY & sleep340"
repo: "https://github.com/Sloan-YXT/astrbot_plugin_meme_manager_plus"
astrbot_version: ">=4.0.0"
support_platforms:
  - aiocqhttp
  - gewechat
